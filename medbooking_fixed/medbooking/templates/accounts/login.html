{% extends 'base.html' %}
{% block title %}Connexion / Login{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <div class="text-center mb-4"><i class="fas fa-heartbeat fa-3x text-primary mb-2"></i><h3>Connexion / Login</h3></div>
        <form method="post">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3"><label class="form-label fw-medium">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100 py-2"><i class="fas fa-sign-in-alt me-2"></i>Connexion / Login</button>
        </form>
        <hr><p class="text-center mb-0">Pas de compte? <a href="{% url 'register' %}">S'inscrire / Register</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
