{% extends 'base.html' %}
{% block title %}Profil / Profile{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card p-4">
        <h4 class="mb-4"><i class="fas fa-user-edit me-2 text-primary"></i>Mon Profil / My Profile</h4>
        <form method="post" enctype="multipart/form-data">{% csrf_token %}
          {% for field in form %}
          <div class="mb-3"><label class="form-label fw-medium">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
          {% endfor %}
          <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Sauvegarder / Save</button>
          <a href="{% url 'dashboard' %}" class="btn btn-secondary ms-2">Retour / Back</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
