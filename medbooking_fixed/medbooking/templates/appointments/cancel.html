{% extends 'base.html' %}
{% block title %}Annuler / Cancel Appointment{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="text-center mb-4"><i class="fas fa-calendar-times fa-3x text-danger mb-2"></i><h4>Annuler le rendez-vous / Cancel Appointment</h4></div>
        <div class="alert alert-warning">
          <strong>Dr. {{ apt.doctor.user.get_full_name }}</strong> — {{ apt.date }} à {{ apt.start_time }}
        </div>
        <form method="post">{% csrf_token %}
          <div class="mb-3"><label class="form-label">Raison (optionnel) / Reason (optional)</label>{{ form.reason }}</div>
          <button type="submit" class="btn btn-danger w-100"><i class="fas fa-times me-2"></i>Confirmer l'annulation / Confirm Cancel</button>
          <a href="{% url 'appointment_detail' apt.pk %}" class="btn btn-secondary w-100 mt-2">Retour / Back</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
